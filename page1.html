<!DOCTYPE html>
<html>
<head>
    <title>Ice Cream Parlour</title>

    <style>
        body {
            font-family: Arial;
            background-color: #fff0f5;
            text-align: center;
        }

        .box {
            width: 300px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border: 1px solid gray;
            border-radius: 10px;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            padding: 10px;
            background-color: pink;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: hotpink;
            color: white;
        }
    </style>
</head>

<body>

<h2>🍦 Ice Cream Parlour</h2>

<div class="box">
    <h3>Customer Details</h3>

    <form>
        <label>Name:</label><br>
        <input type="text" placeholder="Enter your name" required><br>

        <label>Mobile Number:</label><br>
        <input type="tel" placeholder="Enter mobile number" required><br>

       	<a href="page3.html">Go to Page 2</a>
    </form>
</div>

</body>
</html>
